<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Index AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <div class="sidebar">
    <h2>Index</h2>
    <button onclick="newChat()">+ Новый чат</button>
    <div id="chatList"></div>
  </div>

  <div class="main">
    <div id="chat"></div>

    <div class="input-area">
      <input id="msg" placeholder="Напиши сообщение...">
      <button onclick="send()">➤</button>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>

<script src="script.js"></script>
</body>
</html>
